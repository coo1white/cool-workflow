<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-labelledby="ti td">
  <title id="ti">Cool Workflow — your AI report, already proven</title>
  <desc id="td">A clean light hero: headline "Your AI report, already proven", an install command, and a terminal running cw demo tamper that catches three forgeries (ledger, signature, result) offline and prints VERDICT: tamper-evidence holds.</desc>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:800}
      .sub{fill:#64748b;font-size:15px}
      .micro{fill:#94a3b8;font-size:12px}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .tdim{fill:#8b949e}.twhite{fill:#e6edf3}.tg{fill:#3fb950}
      /* Reveal is an ENHANCEMENT: default state is fully visible, so a renderer that
         strips CSS animation still shows the complete diagram. `backwards` hides each
         line only during its pre-start delay. */
      .l1{animation:in .5s ease .6s backwards}
      .l2{animation:in .5s ease 1.2s backwards}
      .l3{animation:in .5s ease 1.8s backwards}
      .l4{animation:in .6s ease 2.5s backwards}
      .l5{animation:in .5s ease 3.0s backwards}
      .cur{animation:blink 1s steps(1) 3.2s infinite}
      @keyframes in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
      @keyframes blink{50%{opacity:0}}
      @media(prefers-reduced-motion:reduce){.l1,.l2,.l3,.l4,.l5,.cur{animation:none}}
    </style>
  </defs>

  <rect x="3" y="3" width="894" height="454" rx="18" fill="#ffffff" stroke="#e6e9ee"/>

  <!-- left: headline + CTA + install -->
  <text x="52" y="118" class="h" font-size="36">Your AI report,</text>
  <text x="52" y="162" class="h" font-size="36" fill="url(#brand)" font-style="italic">already proven.</text>

  <text x="52" y="206" class="sub">The report your agent <tspan font-weight="700" fill="#475569">signs</tspan> — saved, cited, and</text>
  <text x="52" y="228" class="sub">verifiable offline. Not a chat message you lose.</text>

  <rect x="52" y="258" width="148" height="44" rx="10" fill="url(#brand)"/>
  <text x="126" y="285" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Get started →</text>
  <rect x="212" y="258" width="200" height="44" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="312" y="285" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">Watch the 30-sec proof</text>

  <rect x="52" y="322" width="360" height="42" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="68" y="349" class="mono" font-size="14"><tspan fill="#059669" font-weight="700">$ </tspan><tspan fill="#334155">npm install -g cool-workflow</tspan></text>
  <g stroke="#94a3b8" stroke-width="1.4" fill="none"><rect x="384" y="334" width="12" height="14" rx="2"/><path d="M380 344 v-12 h10"/></g>

  <text x="52" y="396" class="micro">ed25519-signed · cited <tspan class="mono">file.ts:42</tspan> · verifiable offline · zero runtime deps</text>

  <!-- right: terminal demo (mise-style green checks) -->
  <g filter="url(#sh)">
    <rect x="470" y="58" width="388" height="344" rx="12" fill="#0d1117"/>
    <path d="M470 70 a12 12 0 0 1 12 -12 h364 a12 12 0 0 1 12 12 v22 h-388 z" fill="#161b22"/>
    <circle cx="492" cy="80" r="5" fill="#ff5f56"/><circle cx="510" cy="80" r="5" fill="#ffbd2e"/><circle cx="528" cy="80" r="5" fill="#27c93f"/>
    <text x="664" y="84" class="mono tdim" font-size="12" text-anchor="middle">cw demo tamper</text>
  </g>
  <g class="mono" font-size="13.5">
    <text x="490" y="132"><tspan class="tg" font-weight="700">$ </tspan><tspan class="twhite">cw demo tamper</tspan></text>
    <text x="490" y="160" class="tdim" font-size="12.5">forged a real signed report 3 ways:</text>

    <text x="490" y="196" class="l1"><tspan class="tg" font-weight="700">✓</tspan><tspan class="twhite" dx="10">ledger forgery</tspan><tspan class="tg" x="790">caught</tspan></text>
    <text x="490" y="224" class="l2"><tspan class="tg" font-weight="700">✓</tspan><tspan class="twhite" dx="10">signature forgery</tspan><tspan class="tg" x="790">caught</tspan></text>
    <text x="490" y="252" class="l3"><tspan class="tg" font-weight="700">✓</tspan><tspan class="twhite" dx="10">result forgery</tspan><tspan class="tg" x="790">caught</tspan></text>

    <g class="l4" transform="translate(0,300)">
      <rect x="482" y="-22" width="364" height="38" rx="8" fill="#0f2417" stroke="#238636"/>
      <text x="498" y="3" class="tg" font-size="15.5" font-weight="700">VERDICT: tamper-evidence holds ✓</text>
    </g>
    <text x="490" y="338" class="l5 tdim" font-size="12">offline · public key only · CW holds no private key<tspan class="tg cur"> ▋</tspan></text>
  </g>
</svg>
