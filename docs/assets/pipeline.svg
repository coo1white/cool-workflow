<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" width="920" height="250" font-family="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-labelledby="pi pd">
  <title id="pi">How Cool Workflow runs: ask, plan, dispatch to agents, verify, commit, cited report</title>
  <desc id="pd">A left-to-right pipeline — ask, plan, dispatch (fanning out to parallel agents), verify, commit — ending in a saved report.md with a clickable file.ts:42 citation. Every step is saved to disk and replayable.</desc>
  <defs>
    <linearGradient id="brand2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .pill{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5}
      .lbl{fill:#334155;font-size:14px;font-weight:600;text-anchor:middle}
      .cap{fill:#94a3b8;font-size:12px;text-anchor:middle}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .pulse{animation:run 3.4s ease-in-out infinite}
      @keyframes run{0%{transform:translateX(0);opacity:0}6%{opacity:1}94%{opacity:1}100%{transform:translateX(632px);opacity:0}}
      .ag{animation:bob 3.4s ease-in-out infinite}
      .ag2{animation-delay:.15s}.ag3{animation-delay:.3s}
      @keyframes bob{0%,40%,100%{fill:#d1fae5}55%,75%{fill:#34d399}}
      @media(prefers-reduced-motion:reduce){.pulse,.ag{animation:none}.pulse{opacity:1}}
    </style>
  </defs>

  <rect x="3" y="3" width="914" height="244" rx="16" fill="#ffffff" stroke="#e6e9ee"/>

  <!-- connector -->
  <line x1="116" y1="86" x2="752" y2="86" stroke="#cbd5e1" stroke-width="2"/>
  <!-- traveling pulse -->
  <circle class="pulse" cx="116" cy="86" r="6" fill="url(#brand2)"/>

  <!-- stages -->
  <g>
    <rect class="pill" x="40" y="66" width="78" height="40" rx="10"/><text class="lbl" x="79" y="91">ask</text>
    <rect class="pill" x="168" y="66" width="82" height="40" rx="10"/><text class="lbl" x="209" y="91">plan</text>
    <rect class="pill" x="300" y="66" width="100" height="40" rx="10"/><text class="lbl" x="350" y="91">dispatch</text>
    <rect class="pill" x="478" y="66" width="84" height="40" rx="10"/><text class="lbl" x="520" y="91">verify</text>
    <rect class="pill" x="608" y="66" width="84" height="40" rx="10"/><text class="lbl" x="650" y="91">commit</text>
  </g>

  <!-- fan-out from dispatch to parallel agents -->
  <g stroke="#cbd5e1" stroke-width="1.5" fill="none">
    <path d="M350 106 C 300 140, 300 150, 300 162"/>
    <path d="M350 106 L 350 162"/>
    <path d="M350 106 C 400 140, 400 150, 400 162"/>
  </g>
  <circle class="ag" cx="300" cy="174" r="11" fill="#d1fae5" stroke="#34d399"/>
  <circle class="ag ag2" cx="350" cy="174" r="11" fill="#d1fae5" stroke="#34d399"/>
  <circle class="ag ag3" cx="400" cy="174" r="11" fill="#d1fae5" stroke="#34d399"/>
  <text class="cap" x="350" y="208">agents run in parallel — out of process</text>

  <!-- report card -->
  <g transform="translate(752,52)">
    <rect x="0" y="0" width="128" height="76" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="mono" x="14" y="24" font-size="12" font-weight="700" fill="#0f172a">report.md</text>
    <line x1="14" y1="34" x2="92" y2="34" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
    <rect x="14" y="44" width="100" height="20" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text class="mono" x="24" y="58" font-size="11" fill="#059669">✓ auth.ts:42</text>
  </g>
  <text class="cap" x="816" y="148">every claim cited · saved · replayable</text>

  <text class="cap" x="460" y="232" font-size="12.5" fill="#64748b">CW keeps the books — it never runs the model itself</text>
</svg>
