name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cool-workflow:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/cool-workflow
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install --no-package-lock
      - run: npm run build
      # Committed dist/ must equal a fresh build of src/ (fail closed on drift).
      # `git status --porcelain` catches modified AND added/deleted dist files;
      # `git diff` would miss untracked ones. release:check re-verifies via dist:check.
      - run: |
          drift="$(git status --porcelain -- dist)"
          if [ -n "$drift" ]; then
            echo "committed dist/ is stale — rebuild with 'npm run build' and commit:"
            echo "$drift"
            exit 1
          fi
      - run: npm run check
      - run: node scripts/cw.js list
      - run: node scripts/cw.js schedule list
      # Enforce the full suite and release gates on every push/PR — not just the
      # lightweight build/check/list above. `npm test` runs all smokes (including
      # the CLI <-> MCP parity smoke); `release:check` adds the parity, vendor
      # manifest, version-sync, golden-path, canonical-apps, and eval gates.
      - run: npm test
      - run: npm run release:check
