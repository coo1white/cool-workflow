name: npm-publish

# Publish cool-workflow to npm when a release tag is pushed (or on manual
# dispatch for an existing tag). A v* tag can only land after the gated release
# flow (deterministic gate -> independent reviewer -> verdict -> the
# block-unapproved-tag hook), so reaching this workflow already implies an
# approved release; the only extra guard here is that the tag matches the
# committed package version, so a stray tag can never publish a mismatched
# artifact. Publishes through npm Trusted Publishing with provenance — a
# cryptographic attestation that this exact version was built from this public
# repo in CI, on-brand for an auditable control-plane and impossible to forge
# for a hand-published tarball. No long-lived npm publish token is needed.

on:
  workflow_run:
    workflows: ["release-gate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag to publish (e.g. v0.1.79)"
        required: true

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/cool-workflow
    steps:
      - name: Gate — refuse if release-gate did not pass
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::release-gate did not pass (conclusion=${{ github.event.workflow_run.conclusion }}). Refusing to publish."
            exit 1
          fi
          echo "release-gate passed — proceeding to publish"
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Use npm with Trusted Publishing support
        run: npm install -g npm@^11.5.1
      - name: Verify the tag matches the committed package version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          REF="${{ github.event.inputs.ref || github.event.workflow_run.head_branch || github.ref_name }}"
          TAG="${REF#v}"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package version $PKG — refusing to publish a mismatched artifact"
            exit 1
          fi
      - name: Verify committed dist/ matches source (fail closed on drift)
        run: |
          npm install --no-package-lock
          npm run build
          drift="$(git status --porcelain -- dist)"
          if [ -n "$drift" ]; then
            echo "::error::committed dist/ is stale — rebuild with 'npm run build' and commit:"
            echo "$drift"
            exit 1
          fi
          echo "dist/ is fresh — proceeding to publish"
      - name: Skip if this version is already published (idempotent re-run)
        id: published
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if npm view "cool-workflow@$PKG" version >/dev/null 2>&1; then
            echo "cool-workflow@$PKG is already on npm — skipping publish. A tag move or"
            echo "re-dispatch must never double-publish or fail closed on an already-shipped version."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm (with provenance)
        if: steps.published.outputs.already != 'true'
        run: npm publish --access public
