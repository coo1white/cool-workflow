name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cool-workflow:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/cool-workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-package-lock
      - run: npm run build
      - run: npm run check
      - run: node scripts/cw.js list
      - run: node scripts/cw.js schedule list
