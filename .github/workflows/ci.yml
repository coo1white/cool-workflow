name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cool-workflow:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        node-version: ["18", "22"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/cool-workflow
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install --no-package-lock
      - run: npm run build
      # Committed dist/ must equal a fresh build of src/ (fail closed on drift).
      # `git status --porcelain` catches modified AND added/deleted dist files;
      # `git diff` would miss untracked ones. release:check re-verifies via dist:check.
      - run: |
          drift="$(git status --porcelain -- dist)"
          if [ -n "$drift" ]; then
            echo "committed dist/ is stale — rebuild with 'npm run build' and commit:"
            echo "$drift"
            exit 1
          fi
      - run: npm run check
      - run: node scripts/cw.js list
      - run: node scripts/cw.js schedule list
      # `test:coverage` already runs the full smoke suite; keep release:check for
      # the remaining parity, manifest, version-sync, golden-path, canonical-apps,
      # and eval gates without running the same suite a second time.
      - run: npm run test:coverage
      - run: npm run release:check -- --skip-tests
